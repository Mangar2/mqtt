server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types application/json text/plain text/css application/javascript text/javascript;

    location = / {
        return 302 /yahagui/;
    }

    location = /yahagui {
        return 302 /yahagui/;
    }

    location /yahagui/ {
        root /var/www;
        index index.html;
        try_files $uri $uri/ /yahagui/index.html;
    }

    # Sensor API used by yaha-gui2
    location = /yahagui/angular/api/sensor.php {
        proxy_pass http://127.0.0.1:8090/store;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Compatibility path
    location = /yahagui/yahagui/angular/api/sensor.php {
        proxy_pass http://127.0.0.1:8090/store;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Direct MessageStore API for new GUI clients
    # /store -> http://127.0.0.1:8090/store
    location = /store {
        proxy_pass http://127.0.0.1:8090/store;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /store/<topicPrefix> -> http://127.0.0.1:8090/store/<topicPrefix>
    location /store/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FileStore/KVStore path used by Angular config API
    # /kvstore -> http://127.0.0.1:8210/
    location = /kvstore {
        proxy_pass http://127.0.0.1:8210/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /kvstore/<key> -> http://127.0.0.1:8210/<key>
    location /kvstore/ {
        proxy_pass http://127.0.0.1:8210/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fallback for direct FileStore key paths without /kvstore prefix.
    # Existing more specific routes (/yahagui, /store, /publish, compatibility
    # endpoints) keep precedence and are not affected.
    location / {
        proxy_pass http://127.0.0.1:8210;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    # Legacy publish.php compatibility path used by Angular app
    location = /yahagui/angular/api/publish.php {
        proxy_pass http://127.0.0.1:8092/publish;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Compatibility path
    location = /yahagui/yahagui/angular/api/publish.php {
        proxy_pass http://127.0.0.1:8092/publish;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Publish interface used by Angular app
    location = /publish {
        proxy_pass http://127.0.0.1:8092/publish;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
