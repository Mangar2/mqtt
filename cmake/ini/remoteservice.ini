# YAHA Remote Service Client Configuration
# ========================================
# Complete template with all supported options.

[mqtt]
host = 127.0.0.1
port = 1883
clientId = yaharemoteserviceclient
reconnectDelayMs = 1000
keepAliveIntervalMs = 30000
loopSleepMs = 20
logReason = true

[filestore]
# Required FileStore host
host = 127.0.0.1
# Required FileStore port [1..65535]
port = 8210
# Required mapping key path in FileStore
filename = /remoteservice/services
# Optional FileStore monitor topic prefix
topicPrefix = $MONITOR/FileStore

[remoteservice]
# TCP listener host
listenHost = 0.0.0.0
# TCP listener port [1..65535]
listenPort = 9123
# Subscription QoS [0..2]
subscribeQoS = 1
