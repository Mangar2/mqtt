# YAHA Remote Service Client Configuration
# ========================================
# Complete template with all supported options.
#
# Data flow overview:
# 1) Client connects to MQTT broker ([mqtt]).
# 2) Service mapping is loaded from FileStore ([filestore].filename).
# 3) Optional FileStore monitor events trigger mapping reloads.
# 4) Remote TCP endpoint listens on [remoteservice].listenHost/listenPort.
#
# Important:
# - [filestore].filename must match the key path where mappings are stored.
# - [filestore].topicPrefix should match FileStore monitor publisher prefix.

[mqtt]
# MQTT broker host/IP.
host = 127.0.0.1

# MQTT broker port [1..65535].
port = 1883

# MQTT client identifier for remote service client.
clientId = yaharemoteserviceclient

# Reconnect delay in milliseconds [1..600000].
reconnectDelayMs = 1000

# MQTT keep-alive interval in milliseconds [1..600000].
keepAliveIntervalMs = 30000

# Runtime loop sleep in milliseconds [1..1000].
loopSleepMs = 20

# Enables MQTT reason diagnostics in logs.
logReason = true

[filestore]
# Required FileStore host/IP.
host = 127.0.0.1

# Required FileStore port [1..65535].
port = 8210

# Required FileStore key path for remote service mapping.
# Example content: service-name -> endpoint metadata.
filename = /remoteservice/services

# Optional FileStore monitor topic prefix.
# Client subscribes to <topicPrefix>/# for reload triggers.
topicPrefix = $MONITOR/FileStore

[remoteservice]
# TCP listener bind host/IP.
listenHost = 0.0.0.0

# TCP listener port [1..65535].
listenPort = 9123

# MQTT subscription QoS used by remote-service topics [0..2].
subscribeQoS = 1
