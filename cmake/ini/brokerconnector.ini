# YAHA Broker Connector Client Configuration
# ==========================================
# Complete template with all supported options.
#
# Data flow overview:
# 1) This client connects to the source HTTP-MQTT broker (`host` + `port`).
# 2) It subscribes to source topics from repeated [subscription] blocks.
# 3) The source broker sends inbound publish callbacks to
#    `listenerHost` + `listenerPort`.
# 4) This process binds the local listener socket on
#    `listenerBindHost` + `listenerPort`.
#
# Important:
# - `listenerHost` must be reachable from the source broker machine.
# - `listenerBindHost` controls only local bind behavior.
# - If source broker is remote, avoid `listenerHost = 127.0.0.1`.

[sourceHttpBroker]
# Source HTTP-MQTT broker endpoint this connector connects to.
# If the source broker runs on another host, use its LAN IP/DNS here.
host = 127.0.0.1

# Source HTTP-MQTT broker endpoint port [1..65535].
port = 8183

# Source-side client identifier presented to source broker.
clientId = broker-connector-source

# Source-side MQTT clean session semantics.
# true: no durable source session state.
# false: source may retain session state when supported.
clean = true

# Source keep alive in seconds [1..86400].
keepAliveSeconds = 30

# Callback host announced to source broker.
# Source broker will call http://listenerHost:listenerPort/publish.
# Must be reachable from source broker network perspective.
listenerHost = 127.0.0.1

# Local bind address for callback listener socket.
# 0.0.0.0 = listen on all interfaces.
# 127.0.0.1 = local-only listener.
# Specific IP = only that local interface.
listenerBindHost = 0.0.0.0

# Local callback listener port [0..65535].
# 0 = auto-pick free port and announce it in connect payload.
listenerPort = 8283

# Repeated source subscriptions.
# Each [subscription] block must contain exactly one topic + one qos.
# qos values: 0 (at-most-once), 1 (at-least-once), 2 (exactly-once).
# MQTT wildcard '#' is valid as topic value.
[subscription]
topic = $SYS/#
qos = 1

[subscription]
topic = #
qos = 1

[receiverMqttBroker]
# Target MQTT broker endpoint for relayed publishes.
host = 127.0.0.1

# Target broker port [1..65535].
port = 1883

# Receiver-side MQTT client identifier.
clientId = broker-connector-receiver

# Reconnect delay in milliseconds [1..600000].
reconnectDelayMs = 1000

# Receiver MQTT keep alive in seconds [1..86400].
keepAliveSeconds = 30

# Runtime loop sleep in milliseconds [1..1000].
loopSleepMs = 20

# Enables lifecycle logs for receiver MQTT runtime.
enableLifecycleTrace = true

[automation]
# Source-side reconnect delay in milliseconds [1..600000].
reconnectDelayMs = 1000

# Source-side loop sleep in milliseconds [1..1000].
sourceLoopSleepMs = 20

# Source-side keep alive interval in milliseconds [1..600000].
# If omitted, derived from source keepAliveSeconds.
sourceKeepAliveIntervalMs = 30000

# Maximum publish retries to receiver broker [0..1000].
maxPublishRetries = 5

# Backoff between publish retries in milliseconds [0..600000].
publishRetryBackoffMs = 100

# true: normalize incoming qos=0 to qos>=1 for relay robustness.
normalizeQosToAtLeastOnce = true

# true: keep incoming retain flag on relayed publish.
retainPassthrough = true

[monitoring]
# Enables source lifecycle trace output.
sourceLifecycleTrace = true

# Enables incoming source publish logging.
logIncomingMessage = true

# Enables outgoing receiver publish logging.
logOutgoingMessage = true
