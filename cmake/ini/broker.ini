# YAHA Broker Configuration
# =========================
# Complete template with all currently supported options.

[network]
# MQTT/TCP listener port (0 disables listener).
# At least one of mqtt_port or ws_port must be non-zero.
mqtt_port = 1883

# MQTT over WebSocket listener port (0 disables listener).
ws_port = 0

[broker]
# If true, clients can connect without username/password.
# Required for current YAHA clients (they do not send credentials).
allow_anonymous = true

# Maximum concurrent client connections [1..100000].
max_connections = 1000

# Per-connection inflight QoS 1/2 receive maximum [1..65535].
receive_maximum = 65535

# Server Keep Alive override in CONNACK, in seconds (0 = disabled).
server_keep_alive = 0

# Maximum accepted Session Expiry Interval in seconds (0 = no hard cap).
session_expiry_max = 0

# Maximum topic alias value (0 = topic aliases disabled).
topic_alias_maximum = 10

# Per-client offline queue capacity [1..100000].
max_queued_messages = 5000

# Per-connection write queue capacity in bytes [1..4194304].
write_queue_max_bytes = 65536

# Per-connection inbound stream buffer cap in bytes [1..67108864].
stream_buffer_max_bytes = 1048576

# Retransmit timeout for outbound QoS1/2 exchanges in seconds (>=1).
qos_retransmit_timeout_seconds = 20

# Main housekeeping loop interval in milliseconds (>=1).
tick_interval_ms = 100

[auth]
# Username/password credential entries used when allow_anonymous=false.
# Repeat key for multiple credentials.
credential = default-user:default-pass
# credential = my-user:my-pass

[acl]
# Optional ACL rules. Repeat key for multiple rules.
# Format: subject:action:pattern
# subject: * | anonymous | authenticated | user:<username>
# action : publish | subscribe
# pattern: MQTT topic filter
# Examples:
# rule = anonymous:publish:$MONITOR/#
# rule = authenticated:subscribe:#

[persistence]
# Persistence mode: full | off | no-states
mode = off

# Backward-compatible legacy toggle (alternative to mode).
# enabled = true

# Persistence directory.
dir = ./data

[tracing]
# Global tracing level: none | error | warning | info | trace
global_level = warning

# Comma-separated module allow-list for trace-level events.
# Empty means no module override.
trace_modules =

# Maximum text length per trace field in bytes [1..1048576].
max_text_length = 2024

# Max emitted records per theme/window [1..1048576].
max_theme_events_per_window = 5

[monitoring]
# Interval in seconds for $SYS topic publish (0 = disabled).
sys_topic_interval = 30
