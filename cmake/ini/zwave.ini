# YAHA ZWave Client Configuration
# ===============================
# Legacy-equivalent configuration migrated from spec/yaha/zwave_config.json.

[mqtt]
host = 127.0.0.1
port = 1883
clientId = yaha/zwave
reconnectDelayMs = 1000
keepAliveIntervalMs = 30000
loopSleepMs = 20
logReason = true

[zwave]
subscribeQoS = 1
qos = 1
retain = false
logIncomingMessages = false
logOutgoingMessages = false

usbDevice = /dev/zwave
usbTopic = $SYS/zwave/usb stick

# Format: topic|nodeId|classId|instance|index|type|label
