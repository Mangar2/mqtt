[mqtt]
host = 127.0.0.1
port = 1883
clientId = yahavalueserviceclient
reconnectDelayMs = 1000
keepAliveIntervalMs = 30000
loopSleepMs = 20

[filestore]
use = true
host = 127.0.0.1
port = 8210
path = /valueservice/values

[monitoring]
topicPrefix = $MONITOR/FileStore

[valueservice]
subscribeQoS = 1
valuesKeyPath = /valueservice/values
monitorTopicPrefix = $MONITOR/FileStore
