[mqtt]
host = 127.0.0.1
port = 1883
clientId = yahavalueserviceclient
reconnectDelayMs = 1000
keepAliveIntervalMs = 30000
loopSleepMs = 20

[filestore]
use = true
host = 127.0.0.1
port = 8210
# Logical file name for the full ValueService map.
filename = /valueservice/values
# Incoming FileStore event channel used for reload triggers.
topicPrefix = $MONITOR/FileStore

[valueservice]
subscribeQoS = 1
