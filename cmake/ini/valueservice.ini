# YAHA Value Service Client Configuration
# =======================================
# Complete template with all supported options.

[mqtt]
host = 127.0.0.1
port = 1883
clientId = yahavalueserviceclient
reconnectDelayMs = 1000
keepAliveIntervalMs = 30000
loopSleepMs = 20
logReason = true

[filestore]
# Enable/disable FileStore integration
use = true
# FileStore host
host = 127.0.0.1
# FileStore port [1..65535]
port = 8210
# Key path for complete values map in FileStore
filename = /valueservice/values
# FileStore monitor topic prefix for reload trigger
topicPrefix = $MONITOR/FileStore

[valueservice]
# Subscription QoS [0..2]
subscribeQoS = 1
# Backward compatible legacy path option
# valuesFileName = /valueservice/values
