# YAHA FileStore Client Configuration
# ===================================
# Complete template with all supported options.
#
# Data flow overview:
# 1) FileStore connects to MQTT broker ([mqtt]).
# 2) It exposes HTTP key/value endpoints on [server].
# 3) Data is persisted in local storage ([filestore]).
# 4) Optional monitoring events are published to MQTT ([monitoring]).
#
# Important:
# - Monitoring topicPrefix should be consistent across all clients.
# - If HTTP is disabled (port=0), other services cannot use FileStore API.

[mqtt]
# MQTT broker host/IP.
host = 127.0.0.1
# MQTT broker port [1..65535].
port = 1883
# MQTT client identifier for FileStore process.
clientId = yahafilestoreclient
# Reconnect delay in milliseconds [1..600000].
reconnectDelayMs = 1000
# MQTT keep-alive interval in milliseconds [1..600000].
keepAliveIntervalMs = 30000
# Runtime loop sleep in milliseconds [1..1000].
loopSleepMs = 20
# Enables MQTT reason diagnostics in logs.
logReason = true

[server]
# HTTP API bind host/IP.
host = 0.0.0.0
# HTTP API bind port [0..65535].
# 0 disables HTTP listener.
port = 8210

[filestore]
# Data directory for persisted key/value files.
directory = ./data
# Number of versions retained per key [1..1024].
keepFiles = 10
# Maximum key-path length [1..4096].
maxKeyLength = 128

[monitoring]
# Enables monitor event publishing for FileStore changes.
enabled = true

# Monitoring topic prefix.
# Typical consumers subscribe to <topicPrefix>/#.
topicPrefix = $MONITOR/FileStore

# Monitoring publish QoS [0..2].
qos = 1

# Monitoring publish retain flag.
retain = false

# File watcher polling interval in milliseconds [1..600000].
watchIntervalMs = 1000
