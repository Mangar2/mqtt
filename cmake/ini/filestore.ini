# YAHA FileStore Client Configuration
# ===================================
# Complete template with all supported options.

[mqtt]
# MQTT broker host
host = 127.0.0.1
# MQTT broker port [1..65535]
port = 1883
# MQTT client identifier
clientId = yahafilestoreclient
# Reconnect delay in milliseconds [1..600000]
reconnectDelayMs = 1000
# Keep alive interval in milliseconds [1..600000]
keepAliveIntervalMs = 30000
# MQTT loop sleep in milliseconds [1..1000]
loopSleepMs = 20
# Log MQTT reason diagnostics
logReason = true

[server]
# HTTP server bind host
host = 0.0.0.0
# HTTP server bind port [0..65535], 0 disables HTTP
port = 8210

[filestore]
# Data directory for persisted files
directory = ./data
# Number of versions per key [1..1024]
keepFiles = 10
# Maximum key path length [1..4096]
maxKeyLength = 128

[monitoring]
# Enable monitoring events
enabled = true
# Monitoring topic prefix
topicPrefix = $MONITOR/FileStore
# Publish QoS [0..2]
qos = 1
# Publish retain flag
retain = false
# File watcher polling interval in ms [1..600000]
watchIntervalMs = 1000
