[mqtt]
host = 127.0.0.1
port = 1883
clientId = yaha-msgstore
reconnectDelayMs = 1000
keepAliveIntervalMs = 30000
loopSleepMs = 20

[server]
host = 0.0.0.0
path = /store
port = 8090

[persist]
directory = ./data
filename = message_store.bak
intervalMs = 5000
keepFiles = 3

[messagestore]
cleanupTopic = $MONITOR/messages/cleanup

[subscription]
topic = $SYS/#
qos = 1

[subscription]
topic = #
qos = 1