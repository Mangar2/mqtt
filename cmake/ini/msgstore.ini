# YAHA Message Store Client Configuration
# =======================================
# Complete template with all supported options.
#
# Data flow overview:
# 1) Client subscribes to configured MQTT topics ([subscription]).
# 2) Incoming payloads are stored in message tree/history.
# 3) Optional HTTP server ([server]) exposes read/write API.
# 4) Periodic persistence snapshots ([persist]) write to disk.
#
# Important:
# - Use repeated [subscription] blocks (topic + qos).
# - Legacy [subscriptions] key/value section is not supported.
# - `cleanupTopic` triggers internal cleanup behavior when published.
# - Monitoring topics are subscribed via `$MONITOR/#`.

[mqtt]
# MQTT broker host/IP.
host = 127.0.0.1

# MQTT broker port [1..65535].
port = 1883

# MQTT client identifier for message store process.
clientId = yaha-msgstore

# Reconnect delay in milliseconds [1..600000].
reconnectDelayMs = 1000

# MQTT keep-alive interval in milliseconds [1..600000].
keepAliveIntervalMs = 30000

# Main loop sleep in milliseconds [1..1000].
loopSleepMs = 20

# Logs MQTT reason details from broker responses.
logReason = true

[server]
# HTTP server bind host/IP.
host = 0.0.0.0

# HTTP base path for message store API routes.
path = /store

# HTTP bind port [0..65535], 0 disables HTTP listener.
port = 8090

[persist]
# Persistence directory path.
directory = ./data

# Base filename for snapshot data.
filename = message_store.bak

# Snapshot interval in milliseconds [0..86400000].
# 0 disables periodic snapshot.
intervalMs = 5000

# Number of backup generations [0..1024].
keepFiles = 3

[messagestore]
# Cleanup trigger topic (incoming command topic).
cleanupTopic = $MONITOR/messages/cleanup

# Logs incoming MQTT messages processed by msgstore.
logIncomingMessages = true

# Enables reason logging in message-store and MQTT paths.
logReason = true

[tree]
# Optional history tree tuning parameters.
# Keep commented unless you need advanced retention/compression tuning.
# maxHistoryLength = 1000
# historyHysterese = 0
# maxValuesPerHistoryEntry = 100
# lengthForFurtherCompression = 0
# upperBoundAddInMilliseconds = 0
# lowerBoundSubInMilliseconds = 0
# upperBoundFactor = 0.0
# lowerBoundFactor = 0.0

# Repeated source subscriptions consumed by msgstore.
# Each [subscription] block must contain exactly one topic + one qos.
# qos values: 0 (at-most-once), 1 (at-least-once), 2 (exactly-once).
# Note: legacy [subscriptions] section is not supported.
[subscription]
topic = $MONITOR/#
qos = 1

[subscription]
topic = $SYS/#
qos = 1

[subscription]
topic = #
qos = 1
