# YAHA RS485 Interface Client Configuration
# =========================================
# Complete template with all supported options.

[mqtt]
host = 127.0.0.1
port = 1883
clientId = yahars485interfaceclient
reconnectDelayMs = 1000
keepAliveIntervalMs = 30000
loopSleepMs = 20
logReason = true

[rs485interface]
# Serial device path
serialPortName = /dev/ttyUSB0
# RS485 baudrate [1..4000000]
baudrate = 57600
# Device address on RS485 bus [1..127]
myAddress = 1
# Max protocol version supported by this node [0..2]
maxVersion = 1
# Scheduler tick delay in milliseconds [1..600000]
tickDelay = 100
# Periodic time-of-day broadcast delay in seconds [1..86400]
timeOfDayDelayInSeconds = 60
# MQTT subscription QoS [0..2]
qos = 1
# Trace level: errors|messages|internal
trace = messages
# Blink action delay in seconds [1..86400]
blinkDelayInSeconds = 3
# Default temporary-on delay in seconds [1..86400]
temporaryOnInSeconds = 1200

[rs485interface.interfaces]
# interfaceName = usedby=<command-list>;map=<name:value|name:value>
Switch = usedby=P;map=on:1|off:0

[rs485interface.settings]
# command = topic suffix used for /set actions
P = /power

[rs485interface.status]
# command = topic suffix used for publish mapping
P = /power

[rs485interface.addresses]
# topic prefix = rs485 address
house/room/device = 5

[rs485interface.topics]
# explicit topic = COMMAND,VALUE,ADDRESS
# house/room/device/switch/s1 = X,1,5
