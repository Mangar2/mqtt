[mqtt]
host = 127.0.0.1
port = 1883
clientId = yahaautomationclient
reconnectDelayMs = 1000
keepAliveIntervalMs = 30000
loopSleepMs = 20

[filestore]
use = true
host = 127.0.0.1
port = 8210
path = /automation/rules
# Incoming FileStore monitoring channel.
# Automation subscribes to <topicPrefix>/# and reloads rules when a matching keyPath event arrives.
topicPrefix = $MONITOR/FileStore

[automation]
# Incoming automation management channel for runtime rule updates.
# Command topic format: <managementTopicPrefix>/<ruleName>/set
managementTopicPrefix = $MONITORING/automation/rules
longitude = 0.0
latitude = 0.0
subscribeQoS = 1
