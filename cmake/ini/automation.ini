# YAHA Automation Client Configuration
# =====================================
# Complete template with all available options.
# Uncomment and customize as needed.
#
# Data flow overview:
# 1) Client connects to MQTT broker ([mqtt]).
# 2) Rules are loaded from FileStore key path ([filestore].path) on startup.
# 3) Runtime rule updates arrive on management topics
#    ([automation].managementTopicPrefix/<ruleName>/set).
# 4) FileStore monitor events on [filestore].topicPrefix trigger rule reloads.
# 5) Incoming subscriptions are evaluated against rules and may emit publishes.
#
# Important:
# - [filestore].path must match the key path used by FileStore content.
# - [filestore].topicPrefix must match FileStore monitor publisher prefix.
# - [subscriptions] entries are additional rule input topics.

# -------- MQTT Client Settings --------
[mqtt]
# MQTT broker hostname/IP.
host = 127.0.0.1

# MQTT broker port [1..65535].
port = 1883

# MQTT client identifier for automation process.
clientId = yahaautomationclient

# Reconnect delay in milliseconds [1..600000].
# Valid range: 1-600000
reconnectDelayMs = 1000

# MQTT keep-alive interval in milliseconds [1..600000].
# Valid range: 1-600000
keepAliveIntervalMs = 30000

# Main loop sleep interval in milliseconds [1..1000].
# Valid range: 1-1000
loopSleepMs = 20

# Logs MQTT reason details from broker responses.
# Useful for protocol-level diagnostics.
# logReason = false

# -------- File Store Settings --------
[filestore]
# Enables FileStore integration for rule persistence.
# false: no startup load and no monitor-based reload from FileStore.
use = true

# FileStore HTTP server host/IP.
host = 127.0.0.1

# FileStore HTTP server port [1..65535].
port = 8210

# FileStore key path for complete automation rules JSON.
# Must match the data key written by your provisioning flow.
path = /automation/rules

# Topic prefix for FileStore monitoring events.
# Automation subscribes to <topicPrefix>/# and reloads rules when
# keyPath in monitor payload matches [filestore].path.
topicPrefix = $MONITOR/FileStore

# -------- Automation-Specific Settings --------
[automation]
# Topic prefix for runtime rule management via MQTT.
# Command topic format: <prefix>/<ruleName>/set
# Payload: JSON rule body.
managementTopicPrefix = $MONITOR/automation/rules

# Geographic longitude used in rule variable context.
# Decimal degrees, example: 8.41 (Nieder-Olm area).
longitude = 0.0

# Geographic latitude used in rule variable context.
# Decimal degrees, example: 50.00 (Nieder-Olm area).
latitude = 0.0

# Default QoS for runtime subscriptions [0..2].
# 0=at-most-once, 1=at-least-once, 2=exactly-once.
subscribeQoS = 1

# Logs incoming MQTT messages evaluated by automation.
logIncomingMessages = false

# Logs outgoing MQTT messages emitted by automation rules.
logOutgoingMessages = false

# -------- Subscription Configuration --------
# Optional custom subscriptions consumed by automation rules.
# Format: topicFilter = qos
# Example: some/topic/# = 1
[subscriptions]
# Example custom subscriptions:
# $MONITOR/presence/set = 1
# some/device/status = 0
# +/+/+/motion_sensor/# = 1
