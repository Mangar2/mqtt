# YAHA HTTP MQTT Interface Client Configuration
# =============================================
# Complete template with all supported options.

[mqtt]
host = 127.0.0.1
port = 1883
clientId = yahahttpmqttinterfaceclient
reconnectDelayMs = 1000
keepAliveIntervalMs = 30000
loopSleepMs = 20
logReason = true

[httpMqttInterface]
# HTTP listener bind host
listenerHost = 0.0.0.0
# HTTP listener bind port [1..65535]
listenerPort = 8092
# Enables /publish.php compatibility route
enablePublishPhpAlias = true
# Legacy PHP response mode toggle
useLegacyPhpResponse = false
