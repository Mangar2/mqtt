[mqtt]
host = 127.0.0.1
port = 1883
clientId = yahafilestoreclient
reconnectDelayMs = 1000
keepAliveIntervalMs = 30000
loopSleepMs = 20
enableLifecycleTrace = true
enableMessageTrace = false

[server]
host = 0.0.0.0
port = 8210

[filestore]
directory = /home/mqtt/filestore/data
keepFiles = 10
maxKeyLength = 128

[monitoring]
enabled = true
topicPrefix = $MONITOR/FileStore
qos = 1
retain = false
watchIntervalMs = 1000
