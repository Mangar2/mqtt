# Default broker configuration.
# This file is intended as a generic shipped baseline, not a test-specific profile.
#
# Usage model:
# - Keep this file conservative and predictable by default.
# - Enable optional features by removing leading '#' from example lines.
# - Prefer small, explicit changes and restart broker after edits.

[network]
mqtt_port = 1883
ws_port = 0
# Standard setting for MQTT only:
# ws_port = 0
# Quick-enable WebSocket listener:
# ws_port = 8083

[broker]
allow_anonymous = true
max_connections = 1000
receive_maximum = 65535
server_keep_alive = 0
session_expiry_max = 0
topic_alias_maximum = 10
max_queued_messages = 5000
write_queue_max_bytes = 65536
stream_buffer_max_bytes = 1048576
qos_retransmit_timeout_seconds = 20
tick_interval_ms = 100
# Standard hardening profile (uncomment to tighten security):
# allow_anonymous = false
# max_connections = 10000
# receive_maximum = 1024
# max_queued_messages = 1000
# write_queue_max_bytes = 262144
# stream_buffer_max_bytes = 2097152
# tick_interval_ms = 50

[auth]
credential = default-user:default-pass
# Add additional users as needed (repeat key):
# credential = ops-user:change-me
# credential = service-user:change-me

[persistence]
mode = off
dir = ./data
# Typical production persistence profile:
# mode = full
# dir = /var/lib/yahabroker
# Raspberry Pi / SD-card profile (avoid frequent state writes):
# mode = no-states

[tracing]
global_level = warning
trace_modules =
max_text_length = 2024
# Quick diagnostics profile:
# global_level = info
# trace_modules = broker,connection,session_manager
# max_text_length = 4096

# -----------------------------------------------------------------------------
# Optional: $SYS monitoring (inactive by default)
# -----------------------------------------------------------------------------
# [monitoring]
# Interval in seconds for periodic $SYS publications.
# Typical defaults:
# - 30 for production baseline
# - 10 for short-term diagnostics
# - 1 only for intensive troubleshooting
# sys_topic_interval = 30

# -----------------------------------------------------------------------------
# Optional: ACL policy examples (inactive by default)
# -----------------------------------------------------------------------------
# Rule format:
# rule = <effect>,<principal>,<action>,<topic-filter>
#
# effect: allow | deny
# principal: username or 'anonymous'
# action: publish | subscribe
# topic-filter: MQTT topic filter (# and + supported)
#
# [acl]
# Minimal hardening for anonymous clients:
# rule = deny,anonymous,publish,#
# rule = deny,anonymous,subscribe,#
#
# Protect system namespace (defense in depth):
# rule = deny,anonymous,publish,$SYS/#
#
# Example role pattern (adjust usernames/topics for your environment):
# rule = allow,ops-user,subscribe,$SYS/#
# rule = allow,service-user,publish,service/+/events
# rule = allow,service-user,subscribe,service/+/commands

# -----------------------------------------------------------------------------
# Optional: YAHA Automation client runtime settings (inactive by default)
# -----------------------------------------------------------------------------
# [automation]
# Set true to log incoming messages handled by yahaautomationclient.
# Default: false
# logIncomingMessages = false
#
# Set true to log outgoing rule and acknowledgment messages from yahaautomationclient.
# Default: false
# logOutgoingMessages = false
